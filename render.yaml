services:
  - type: web
    name: options-signal-scanner
    runtime: node
    buildCommand: ""
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: data
      mountPath: /opt/render/project/src/.cache
      sizeGB: 1
